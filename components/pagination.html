<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>Pagination</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        color: #343a40;
        line-height: 1;
        display: flex;
        justify-content: center;
      }

      .pagination {
        display: flex;
        padding: 5px;
        margin-top: 20%;
      }
      .box {
        border: 1px solid black;
        padding: 5px;
        cursor: pointer;
      }

      .box:hover {
        background-color: rgb(190, 188, 188);
      }
    </style>
  </head>
  <body>
    <div class="pagination">
      <div class="move box">Prev</div>
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">...</div>
      <div class="move box">Next</div>
    </div>
  </body>
</html>
